[project]
name = "lora-coverage-api"
version = "0.1.0"
description = "LoRa Coverage Platform — REST API service (FastAPI)"
requires-python = ">=3.12,<3.13"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "sqlalchemy>=2.0",
    "geoalchemy2>=0.16",
    "psycopg[binary]>=3.2",
    "alembic>=1.13",
    "structlog>=24.4",
    "slowapi>=0.1.9",
    "orjson>=3.10",
    "prometheus-client>=0.21",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lora_coverage_api"]

[tool.ruff]
extend = "../../pyproject.toml"
