# ──────────────────────────────────────────────────────────────────────
# LoRa Coverage Platform — local dev stack
# v1 production: cùng file này chạy trên 1 VPS Hetzner CPX31.
# Valkey commented out (TRIGGERED — chỉ enable khi traffic > ngưỡng).
#
# Chạy:  docker compose up -d
#   → db (lora-wan-db) → migrate (chạy alembic 1 lần) → api-service
# ──────────────────────────────────────────────────────────────────────

services:
  db:
    # Image gộp PostGIS 3.5 + TimescaleDB 2.17 trên Postgres 17.
    image: timescale/timescaledb-ha:pg17-ts2.17-all
    container_name: lora-wan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lora_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lora_pass_2024}
      POSTGRES_DB: ${POSTGRES_DB:-lora_coverage}
    ports:
      - "5432:5432"
    volumes:
      - lora-wan-db-data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lora_user} -d ${POSTGRES_DB:-lora_coverage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    # Dùng lại image của api-service (đã có alembic + deps). Mount thư mục
    # migrations từ host vì image runtime không copy nó vào.
    build:
      context: ./services/api-service
      dockerfile: Dockerfile
    container_name: lora-wan-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lora_user}:${POSTGRES_PASSWORD:-lora_pass_2024}@db:5432/${POSTGRES_DB:-lora_coverage}
    volumes:
      - ./migrations:/app/migrations:ro
    working_dir: /app
    entrypoint: ["/usr/bin/tini", "--"]
    command: ["alembic", "-c", "migrations/alembic.ini", "upgrade", "head"]
    restart: "no"

  api-service:
    build:
      context: ./services/api-service
      dockerfile: Dockerfile
    container_name: lora-wan-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lora_user}:${POSTGRES_PASSWORD:-lora_pass_2024}@db:5432/${POSTGRES_DB:-lora_coverage}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      ML_MODEL_VERSION: ${ML_MODEL_VERSION:-stage1-loglike-v0.1.0}
      LORA_ENV_PROFILE: ${LORA_ENV_PROFILE:-suburban}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-24}
      LINKING_FERNET_KEYS: ${LINKING_FERNET_KEYS}
      DEFAULT_DEVICE_TX_POWER_DBM: ${DEFAULT_DEVICE_TX_POWER_DBM:-14.0}
      DEFAULT_DEVICE_TX_ANTENNA_GAIN_DBI: ${DEFAULT_DEVICE_TX_ANTENNA_GAIN_DBI:-2.0}
      DEFAULT_DEVICE_RX_ANTENNA_GAIN_DBI: ${DEFAULT_DEVICE_RX_ANTENNA_GAIN_DBI:-0.0}
      STAGE2_PREDICT_BASE_URL: ${STAGE2_PREDICT_BASE_URL:-http://ml-service-predict:8001}
      STAGE2_AUTH_TOKEN: ${LORA_STAGE2_AUTH_TOKEN:-stage2-dev-please-change}
      STAGE2_TIMEOUT_SECONDS: ${STAGE2_TIMEOUT_SECONDS:-0.5}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)\""]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  ml-service-predict:
    # Predict-ML serving (Stage 2 LightGBM residual). Context = repo root vì
    # Dockerfile cần workspace pyproject + sdk-python + lora-coverage-api source
    # (workspace dep).
    build:
      context: .
      dockerfile: services/ml-service-predict/Dockerfile
    container_name: lora-wan-ml-predict
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      LORA_DB_URL: postgresql://${POSTGRES_USER:-lora_user}:${POSTGRES_PASSWORD:-lora_pass_2024}@db:5432/${POSTGRES_DB:-lora_coverage}
      LORA_DEM_PATH: /data/dem/copernicus_glo30_danang.tif
      LORA_DEM_PATH_NORTH_VN: /data/dem/copernicus_glo30_north_vn.tif
      LORA_URBANIZATION_PATH: /data/osm/urbanization_vn.tif
      LORA_ENV_PROFILE: ${LORA_ENV_PROFILE:-suburban}
      LORA_STAGE2_AUTH_TOKEN: ${LORA_STAGE2_AUTH_TOKEN:-stage2-dev-please-change}
      # Mirror host artifact dir vị trí trong container → artifact_uri trong DB
      # (relative path từ repo root) resolve giống host. Cùng layout = không
      # cần rewrite path khi train host → load container.
      LORA_STAGE2_ARTIFACT_DIR: services/ml-service-predict/artifacts/stage2
    volumes:
      # Raster files (DEM + urbanization) live on host. Read-only mount.
      - ${LORA_DATA_DIR:-E:/DATN/lora-data}:/data:ro
      # Stage 2 artifacts: mount mirror đường dẫn host để relative path
      # `services/ml-service-predict/artifacts/...` từ CWD=/app resolve OK.
      - ./services/ml-service-predict/artifacts:/app/services/ml-service-predict/artifacts
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz', timeout=3)\""]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── Web frontend (chạy local bằng `npm run dev`, không build trong stack v0) ──
  # Production: build static rồi serve qua Nginx.

  # ── Valkey (TRIGGERED — uncomment khi cần) ──────────────────────────
  # cache:
  #   image: valkey/valkey:8-alpine
  #   container_name: lora-wan-cache
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   command: ["valkey-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]

volumes:
  lora-wan-db-data:
    # Tên cố định (không prefix project) → reuse volume cũ nếu đã tồn tại,
    # tự tạo mới khi clone fresh.
    name: lora-wan-db-data
