# ──────────────────────────────────────────────────────────────────────
# LoRa Coverage Platform — local dev stack
# v1 production: cùng file này chạy trên 1 VPS Hetzner CPX31.
# Valkey = centralized rate-limit storage (Chapter 4 §High-Level Arch):
#   api-service chạy --workers 2 → in-memory counter diverges per worker,
#   effective limit ~2x ngưỡng config. Valkey shared store fix root cause
#   thay vì band-aid (workers=1 sẽ giảm throughput).
#
# Chạy:  docker compose up -d
#   → db (lora-wan-db) → migrate (chạy alembic 1 lần) → api-service
# ──────────────────────────────────────────────────────────────────────

services:
  db:
    # Image gộp PostGIS 3.5 + TimescaleDB 2.17 trên Postgres 17.
    image: timescale/timescaledb-ha:pg17-ts2.17-all
    container_name: lora-wan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lora_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}
      POSTGRES_DB: ${POSTGRES_DB:-lora_coverage}
    ports:
      - "5432:5432"
    volumes:
      - lora-wan-db-data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lora_user} -d ${POSTGRES_DB:-lora_coverage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    # Dùng lại image của api-service (đã có alembic + deps). Mount thư mục
    # migrations từ host vì image runtime không copy nó vào. Context = repo
    # root vì Dockerfile cần workspace pyproject + vendor/crc_covlib wheel.
    # Image tag PHẢI khớp api-service để alembic version code trùng app code.
    image: lora-wan-api:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: services/api-service/Dockerfile
    container_name: lora-wan-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lora_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}@db:5432/${POSTGRES_DB:-lora_coverage}
    volumes:
      - ./migrations:/app/migrations:ro
    working_dir: /app
    entrypoint: ["/usr/bin/tini", "--"]
    # `python -m alembic` thay vì `alembic` vì shebang của /install/bin/alembic
    # trỏ tới /build/.venv/bin/python (builder venv, không tồn tại ở runtime).
    command: ["python", "-m", "alembic", "-c", "migrations/alembic.ini", "upgrade", "head"]
    restart: "no"

  api-service:
    # Context = repo root vì Dockerfile cần workspace pyproject + sdk-python +
    # vendor/crc_covlib wheel (tool.uv.sources trỏ vào ../../vendor/...).
    #
    # Rollback strategy (pre-deploy checklist §9): tag image bằng git SHA
    # (vd `IMAGE_TAG=$(git rev-parse --short HEAD)`). Compose dùng cùng tag
    # cho build + run → image cũ vẫn trên disk → revert chỉ là set IMAGE_TAG
    # lại SHA cũ + `docker compose up -d --no-build api-service`. Xem DEPLOY.md.
    image: lora-wan-api:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: services/api-service/Dockerfile
    container_name: lora-wan-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      cache:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lora_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}@db:5432/${POSTGRES_DB:-lora_coverage}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      ML_MODEL_VERSION: ${ML_MODEL_VERSION:-stage1-itu-p1812-v0.1.0}
      LORA_ENV_PROFILE: ${LORA_ENV_PROFILE:-suburban}
      # Stage 1 ITU-R P.1812 + P.2108 backend
      LORA_DEM_DIRECTORY: /data/dem
      # Container-internal path. Empty = reuse terrain dir (no buildings).
      # Host .env dùng Windows path cho script chạy ngoài container — KHÔNG
      # propagate host path vào đây vì container không mount E:/... drive.
      LORA_SURFACE_DEM_DIRECTORY: /data/dem-surface
      LORA_ITU_PERCENT_TIME: ${LORA_ITU_PERCENT_TIME:-50.0}
      LORA_ITU_PERCENT_LOCATION: ${LORA_ITU_PERCENT_LOCATION:-50.0}
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TTL_MINUTES: ${ACCESS_TTL_MINUTES:-15}
      REFRESH_TTL_DAYS: ${REFRESH_TTL_DAYS:-30}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      REFRESH_COOKIE_SAMESITE: ${REFRESH_COOKIE_SAMESITE:-lax}
      LINKING_FERNET_KEYS: ${LINKING_FERNET_KEYS}
      DEFAULT_DEVICE_TX_POWER_DBM: ${DEFAULT_DEVICE_TX_POWER_DBM:-14.0}
      DEFAULT_DEVICE_TX_ANTENNA_GAIN_DBI: ${DEFAULT_DEVICE_TX_ANTENNA_GAIN_DBI:-2.0}
      DEFAULT_DEVICE_RX_ANTENNA_GAIN_DBI: ${DEFAULT_DEVICE_RX_ANTENNA_GAIN_DBI:-0.0}
      # Stage 2 disabled (ML handoff in progress). Empty base_url = api-service
      # bypass /residual call, dùng Stage1-only response. Set ở host .env
      # (STAGE2_PREDICT_BASE_URL=http://ml-service:8001) khi dev mới có model.
      STAGE2_PREDICT_BASE_URL: ${STAGE2_PREDICT_BASE_URL:-}
      STAGE2_AUTH_TOKEN: ${LORA_STAGE2_AUTH_TOKEN:?LORA_STAGE2_AUTH_TOKEN required in .env}
      STAGE2_TIMEOUT_SECONDS: ${STAGE2_TIMEOUT_SECONDS:-0.5}
      # ChirpStack per-user webhook ingest (plan ChirpStack per-user webhook).
      # Production: WEBHOOK_BASE_URL phải là origin public-facing (vd
      # https://api.example.com); empty trong production → startup fail-fast.
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-}
      CHIRPSTACK_WEBHOOK_RATE_LIMIT: ${CHIRPSTACK_WEBHOOK_RATE_LIMIT:-600/minute}
      COVERAGE_PREDICT_RATE_LIMIT: ${COVERAGE_PREDICT_RATE_LIMIT:-30/minute}
      COVERAGE_LOOKUP_RATE_LIMIT: ${COVERAGE_LOOKUP_RATE_LIMIT:-30/minute}
      COVERAGE_BATCH_RATE_LIMIT: ${COVERAGE_BATCH_RATE_LIMIT:-1/minute}
      # Centralized rate-limit store (Chapter 4 §Distributed Environments).
      # Empty = in-memory (dev / single-worker). Compose mặc định trỏ tới
      # service `cache` để 2 workers đếm chung counter, không bị divergence.
      RATE_LIMIT_STORAGE_URI: ${RATE_LIMIT_STORAGE_URI:-redis://cache:6379/0}
      # Password reset (pre-deploy checklist §2). SMTP_HOST empty = NoOpMailer
      # (dev console log); production validator fail-fast nếu empty.
      PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-30}
      PASSWORD_RESET_URL_TEMPLATE: ${PASSWORD_RESET_URL_TEMPLATE:-http://localhost:5173/?reset={token}}
      AUTH_PASSWORD_RESET_REQUEST_RATE_LIMIT: ${AUTH_PASSWORD_RESET_REQUEST_RATE_LIMIT:-5/hour}
      AUTH_PASSWORD_RESET_CONFIRM_RATE_LIMIT: ${AUTH_PASSWORD_RESET_CONFIRM_RATE_LIMIT:-10/hour}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@lora-coverage.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-LoRa Coverage}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-true}
    volumes:
      # DEM tiles (Copernicus GLO-30 GeoTIFF) cho Stage 1 ITU-R P.1812. Read-only.
      - ${LORA_DATA_DIR:-E:/DATN/lora-data}:/data:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)\""]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── ml-service ────────────────────────────────────────────────────────
  # Đang handoff cho dev ML mới. Folder `services/ml-service/` chỉ còn README +
  # `reference_wireless/` (model XGBoost dev mới author trước khi join repo).
  # (chỉ giữ làm reference, không deploy). api-service chạy Stage1-only —
  # STAGE2_PREDICT_BASE_URL rỗng. Dev mới khi sẵn sàng sẽ tự thêm service block
  # vào file này.

  # ── Web frontend (chạy local bằng `npm run dev`, không build trong stack v0) ──
  # Production: build static rồi serve qua Nginx.

  # ── Valkey — centralized rate-limit counter store ────────────────────
  # Chapter 4 §Architecture: rate limiter middleware đọc/ghi counter qua
  # cache shared, không phải in-memory per worker. slowapi → limits →
  # redis client (sync) trỏ vào service này qua RATE_LIMIT_STORAGE_URI.
  # KHÔNG expose port ra host trong production — chỉ api-service kết nối
  # qua docker network. Dev có thể `docker compose port cache 6379` khi cần.
  cache:
    image: valkey/valkey:8-alpine
    container_name: lora-wan-cache
    restart: unless-stopped
    # allkeys-lru: rate-limit counter TTL ngắn (vài phút) — LRU eviction safe.
    # 64mb đủ cho ~hundreds of K key (mỗi key vài chục byte).
    command: ["valkey-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  lora-wan-db-data:
    # Tên cố định (không prefix project) → reuse volume cũ nếu đã tồn tại,
    # tự tạo mới khi clone fresh.
    name: lora-wan-db-data
