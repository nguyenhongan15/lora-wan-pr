# ──────────────────────────────────────────────────────────────────────
# LoRa Coverage Platform — local dev stack
# v1 production: cùng file này chạy trên 1 VPS Hetzner CPX31.
# Valkey commented out (TRIGGERED — chỉ enable khi traffic > ngưỡng).
#
# Chạy:  docker compose up -d
#   → db (lora-wan-db) → migrate (chạy alembic 1 lần) → api-service
# ──────────────────────────────────────────────────────────────────────

services:
  db:
    # Image gộp PostGIS 3.5 + TimescaleDB 2.17 trên Postgres 17.
    image: timescale/timescaledb-ha:pg17-ts2.17-all
    container_name: lora-wan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lora_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}
      POSTGRES_DB: ${POSTGRES_DB:-lora_coverage}
    ports:
      - "5432:5432"
    volumes:
      - lora-wan-db-data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lora_user} -d ${POSTGRES_DB:-lora_coverage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    # Dùng lại image của api-service (đã có alembic + deps). Mount thư mục
    # migrations từ host vì image runtime không copy nó vào. Context = repo
    # root vì Dockerfile cần workspace pyproject + vendor/crc_covlib wheel.
    build:
      context: .
      dockerfile: services/api-service/Dockerfile
    container_name: lora-wan-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lora_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}@db:5432/${POSTGRES_DB:-lora_coverage}
    volumes:
      - ./migrations:/app/migrations:ro
    working_dir: /app
    entrypoint: ["/usr/bin/tini", "--"]
    # `python -m alembic` thay vì `alembic` vì shebang của /install/bin/alembic
    # trỏ tới /build/.venv/bin/python (builder venv, không tồn tại ở runtime).
    command: ["python", "-m", "alembic", "-c", "migrations/alembic.ini", "upgrade", "head"]
    restart: "no"

  api-service:
    # Context = repo root vì Dockerfile cần workspace pyproject + sdk-python +
    # vendor/crc_covlib wheel (tool.uv.sources trỏ vào ../../vendor/...).
    build:
      context: .
      dockerfile: services/api-service/Dockerfile
    container_name: lora-wan-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lora_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}@db:5432/${POSTGRES_DB:-lora_coverage}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      ML_MODEL_VERSION: ${ML_MODEL_VERSION:-stage1-itu-p1812-v0.1.0}
      LORA_ENV_PROFILE: ${LORA_ENV_PROFILE:-suburban}
      # Stage 1 ITU-R P.1812 + P.2108 backend
      LORA_DEM_DIRECTORY: /data/dem
      # Container-internal path. Empty = reuse terrain dir (no buildings).
      # Host .env dùng Windows path cho script chạy ngoài container — KHÔNG
      # propagate host path vào đây vì container không mount E:/... drive.
      LORA_SURFACE_DEM_DIRECTORY: /data/dem-surface
      LORA_ITU_PERCENT_TIME: ${LORA_ITU_PERCENT_TIME:-50.0}
      LORA_ITU_PERCENT_LOCATION: ${LORA_ITU_PERCENT_LOCATION:-50.0}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-24}
      LINKING_FERNET_KEYS: ${LINKING_FERNET_KEYS}
      DEFAULT_DEVICE_TX_POWER_DBM: ${DEFAULT_DEVICE_TX_POWER_DBM:-14.0}
      DEFAULT_DEVICE_TX_ANTENNA_GAIN_DBI: ${DEFAULT_DEVICE_TX_ANTENNA_GAIN_DBI:-2.0}
      DEFAULT_DEVICE_RX_ANTENNA_GAIN_DBI: ${DEFAULT_DEVICE_RX_ANTENNA_GAIN_DBI:-0.0}
      # Stage 2 disabled (ML handoff in progress). Empty base_url = api-service
      # bypass /residual call, dùng Stage1-only response. Set ở host .env
      # (STAGE2_PREDICT_BASE_URL=http://ml-service:8001) khi dev mới có model.
      STAGE2_PREDICT_BASE_URL: ${STAGE2_PREDICT_BASE_URL:-}
      STAGE2_AUTH_TOKEN: ${LORA_STAGE2_AUTH_TOKEN:?LORA_STAGE2_AUTH_TOKEN required in .env}
      STAGE2_TIMEOUT_SECONDS: ${STAGE2_TIMEOUT_SECONDS:-0.5}
    volumes:
      # DEM tiles (Copernicus GLO-30 GeoTIFF) cho Stage 1 ITU-R P.1812. Read-only.
      - ${LORA_DATA_DIR:-E:/DATN/lora-data}:/data:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)\""]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── ml-service ────────────────────────────────────────────────────────
  # Đang handoff cho dev ML mới. Folder `services/ml-service/` chỉ còn README +
  # `reference_wireless/` (model XGBoost dev mới author trước khi join repo).
  # (chỉ giữ làm reference, không deploy). api-service chạy Stage1-only —
  # STAGE2_PREDICT_BASE_URL rỗng. Dev mới khi sẵn sàng sẽ tự thêm service block
  # vào file này.

  # ── Web frontend (chạy local bằng `npm run dev`, không build trong stack v0) ──
  # Production: build static rồi serve qua Nginx.

  # ── Valkey (TRIGGERED — uncomment khi cần) ──────────────────────────
  # cache:
  #   image: valkey/valkey:8-alpine
  #   container_name: lora-wan-cache
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   command: ["valkey-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]

volumes:
  lora-wan-db-data:
    # Tên cố định (không prefix project) → reuse volume cũ nếu đã tồn tại,
    # tự tạo mới khi clone fresh.
    name: lora-wan-db-data
