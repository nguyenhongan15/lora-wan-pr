# ──────────────────────────────────────────────────────────────────────
# LoRa Coverage Platform — local dev stack
# v1 production: cùng file này chạy trên 1 VPS Hetzner CPX31.
# Valkey commented out (TRIGGERED — chỉ enable khi traffic > ngưỡng).
# ──────────────────────────────────────────────────────────────────────

services:
  db:
    # Image gộp PostGIS 3.5 + TimescaleDB 2.17 trên Postgres 17.
    image: timescale/timescaledb-ha:pg17-ts2.17-all
    container_name: lora-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-lora_coverage}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lora} -d ${POSTGRES_DB:-lora_coverage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-service:
    build:
      context: ./services/api-service
      dockerfile: Dockerfile
    container_name: lora-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lora}:${POSTGRES_PASSWORD:-change_me_in_production}@db:5432/${POSTGRES_DB:-lora_coverage}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      ML_MODEL_VERSION: ${ML_MODEL_VERSION:-stage1-loglike-v0.1.0}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)\""]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Web frontend (chạy local bằng `npm run dev`, không build trong stack v0) ──
  # Production: build static rồi serve qua Nginx.

  # ── Valkey (TRIGGERED — uncomment khi cần) ──────────────────────────
  # cache:
  #   image: valkey/valkey:8-alpine
  #   container_name: lora-cache
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   command: ["valkey-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]

volumes:
  db-data:
