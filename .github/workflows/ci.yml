name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-service
    services:
      # PostGIS + TimescaleDB cùng 1 image (theo docker-compose.yml).
      # Migration 0001 cần CREATE EXTENSION postgis; image -ts2.17-all đã có sẵn.
      postgres:
        image: timescale/timescaledb-ha:pg17-ts2.17-all
        env:
          POSTGRES_USER: lora
          POSTGRES_PASSWORD: test
          POSTGRES_DB: lora_coverage
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lora -d lora_coverage"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          # Lock file ở ROOT (uv workspace có 1 lock duy nhất).
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Sync ở ROOT để kéo về cả dev groups của workspace
      # (ruff, mypy, import-linter, pytest, ...).
      # `--all-extras` giữ tương thích nếu sau này có optional deps;
      # `--all-groups` là phần thiết yếu để CI có ruff/mypy/...
      - name: Install deps
        working-directory: .
        run: uv sync --all-extras --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      # Mypy phải chạy từ ROOT để dùng đúng [tool.mypy] strict config
      # (mypy không tự leo lên parent tìm config như ruff).
      - name: Mypy
        working-directory: .
        run: uv run mypy services/api-service/src

      # import-linter đã có trong dev group root sau khi sync,
      # không cần pip install thêm.
      - name: import-linter (5-layer separation)
        working-directory: .
        run: uv run lint-imports --config .importlinter

      - name: No leaky strings in application/
        working-directory: .
        run: |
          if grep -rEn 'postgres|redis|valkey|s3|stage_4|GiST|BRIN' \
              services/api-service/src/lora_coverage_api/application/ \
              services/api-service/src/lora_coverage_api/domain/; then
            echo "::error::application/ or domain/ leaked storage-tier strings"
            exit 1
          fi

      - name: Alembic upgrade
        working-directory: .
        env:
          DATABASE_URL: postgresql+psycopg://lora:test@localhost:5432/lora_coverage
        run: uv run alembic -c migrations/alembic.ini upgrade head

      - name: Seed gateways
        working-directory: .
        env:
          DATABASE_URL: postgresql+psycopg://lora:test@localhost:5432/lora_coverage
        run: uv run --project services/api-service python scripts/seed_gateways.py  

      - name: Pytest
        working-directory: .
        env:
          DATABASE_URL: postgresql+psycopg://lora:test@localhost:5432/lora_coverage
        run: uv run pytest -v

  docker-build:
    # Smoke-build container image — đảm bảo Dockerfile vẫn build được
    # (đa-stage, non-root, healthcheck) theo rule-design-containers.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build api-service image (no push)
        uses: docker/build-push-action@v6
        with:
          context: services/api-service
          file: services/api-service/Dockerfile
          push: false
          load: true
          tags: lora-coverage-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image starts
        run: |
          docker run --rm --name api-smoke -d -p 8000:8000 \
            -e DATABASE_URL=postgresql+psycopg://lora:test@127.0.0.1:5432/none \
            lora-coverage-api:ci
          # Đợi tối đa 15s rồi kill — chỉ cần process khởi động không crash.
          for i in $(seq 1 15); do
            if docker ps --filter name=api-smoke --filter status=running -q | grep -q .; then
              echo "container running after ${i}s"
              docker logs api-smoke | tail -20
              docker stop api-smoke
              exit 0
            fi
            sleep 1
          done
          echo "::error::container failed to start"
          docker logs api-smoke || true
          exit 1

  web-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        working-directory: .
        run: npm install

      - name: Lint
        run: npm run lint

      - name: JSDoc check (tsc --checkJs)
        run: npm run jsdoc-check

      - name: Build
        run: npm run build