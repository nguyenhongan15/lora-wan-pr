name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Hủy run cũ khi PR push thêm commit; main vẫn chạy hết để giữ lịch sử.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1) Phát hiện đường dẫn thay đổi → skip job không liên quan.
  # ─────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api-service/**'
              - 'migrations/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.importlinter'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            web:
              - 'apps/web-app/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            docker:
              - 'services/api-service/Dockerfile'
              - 'services/api-service/**'
              - '.github/workflows/ci.yml'

  # ─────────────────────────────────────────────────────────────
  # 2) Lint song song — KHÔNG cần Postgres → khởi động cực nhanh.
  #    Mỗi task chạy trên runner riêng, fail-fast: false để thấy
  #    hết lỗi trong 1 lần push.
  # ─────────────────────────────────────────────────────────────
  api-lint:
    name: api-lint / ${{ matrix.task.name }}
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task:
          - name: ruff-check
            cache: ruff
            cmd: uv run ruff check .
          - name: ruff-format
            cache: ruff
            cmd: uv run ruff format --check .
          # Mypy phải chạy từ ROOT để dùng đúng [tool.mypy] strict config
          # (mypy không tự leo lên parent tìm config như ruff).
          - name: mypy
            cache: mypy
            cmd: uv run mypy services/api-service/src
          # import-linter đã có trong dev group root sau khi sync,
          # không cần pip install thêm.
          - name: import-linter
            cache: none
            cmd: uv run lint-imports --config .importlinter
          - name: no-leaky-strings
            cache: none
            cmd: |
              if grep -rEn 'postgres|redis|valkey|s3|stage_4|GiST|BRIN' \
                  services/api-service/src/lora_coverage_api/application/ \
                  services/api-service/src/lora_coverage_api/domain/; then
                echo "::error::application/ or domain/ leaked storage-tier strings"
                exit 1
              fi
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv

      - name: Restore mypy cache
        if: matrix.task.cache == 'mypy'
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('uv.lock') }}-${{ hashFiles('services/api-service/src/**/*.py') }}
          restore-keys: |
            mypy-${{ runner.os }}-${{ hashFiles('uv.lock') }}-
            mypy-${{ runner.os }}-

      - name: Restore ruff cache
        if: matrix.task.cache == 'ruff'
        uses: actions/cache@v4
        with:
          path: .ruff_cache
          key: ruff-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: ruff-${{ runner.os }}-

      - name: Run ${{ matrix.task.name }}
        run: ${{ matrix.task.cmd }}

  # ─────────────────────────────────────────────────────────────
  # 3) Test có DB — chạy SONG SONG với api-lint.
  # ─────────────────────────────────────────────────────────────
  api-test:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    services:
      # PostGIS + TimescaleDB cùng 1 image (theo docker-compose.yml).
      # Migration 0001 cần CREATE EXTENSION postgis; image -ts2.17-all đã có sẵn.
      postgres:
        image: timescale/timescaledb-ha:pg17-ts2.17-all
        env:
          POSTGRES_USER: lora
          POSTGRES_PASSWORD: test
          POSTGRES_DB: lora_coverage
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lora -d lora_coverage"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://lora:test@localhost:5432/lora_coverage
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv

      # Gộp 2 step thành 1 → bớt 1 lần spawn `uv run`.
      # Không cần `--project` vì `--all-packages` ở composite action đã
      # editable-install lora_coverage_api vào root .venv.
      - name: Migrate + seed
        run: |
          uv run alembic -c migrations/alembic.ini upgrade head
          uv run python services/api-service/scripts/seed_gateways.py

      - name: Pytest
        run: uv run pytest -v

  # ─────────────────────────────────────────────────────────────
  # 4) Smoke build container — đảm bảo Dockerfile vẫn build được
  #    (đa-stage, non-root, healthcheck) theo rule-design-containers.md.
  # ─────────────────────────────────────────────────────────────
  docker-build:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build api-service image (no push)
        uses: docker/build-push-action@v6
        with:
          context: services/api-service
          file: services/api-service/Dockerfile
          push: false
          load: true
          tags: lora-coverage-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image starts
        run: |
          docker run --rm --name api-smoke -d -p 8000:8000 \
            -e DATABASE_URL=postgresql+psycopg://lora:test@127.0.0.1:5432/none \
            lora-coverage-api:ci
          # Đợi tối đa 15s rồi kill — chỉ cần process khởi động không crash.
          for i in $(seq 1 15); do
            if docker ps --filter name=api-smoke --filter status=running -q | grep -q .; then
              echo "container running after ${i}s"
              docker logs api-smoke | tail -20
              docker stop api-smoke
              exit 0
            fi
            sleep 1
          done
          echo "::error::container failed to start"
          docker logs api-smoke || true
          exit 1

  # ─────────────────────────────────────────────────────────────
  # 5) Frontend.
  # ─────────────────────────────────────────────────────────────
  web-app:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        working-directory: .
        run: npm ci

      # Gộp 3 step (lint → jsdoc-check → build) trong 1 shell — bớt overhead.
      # Nếu muốn parallel hoá, đổi thành matrix tương tự api-lint.
      - name: Lint + JSDoc + Build
        run: |
          npm run lint
          npm run jsdoc-check
          npm run build

  # ─────────────────────────────────────────────────────────────
  # 6) Aggregation job cho branch protection.
  #    Vì các job kia có `if:` (skip khi không liên quan), GitHub
  #    branch protection không tự coi "skipped == ok" — phải có
  #    1 job tổng hợp như thế này làm required check.
  # ─────────────────────────────────────────────────────────────
  ci:
    if: always()
    needs: [changes, api-lint, api-test, docker-build, web-app]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS_JSON"
          # `result` của job bị skip là 'skipped' — coi như pass.
          # Chỉ fail nếu có job 'failure' hoặc 'cancelled'.
          if echo "$NEEDS_JSON" | grep -qE '"result":[[:space:]]*"(failure|cancelled)"'; then
            echo "::error::A required job failed or was cancelled."
            exit 1
          fi