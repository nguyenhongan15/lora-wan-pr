name: Setup Python + uv
description: >
  Cài uv (kèm cache), set up Python, và sync uv workspace với
  --all-extras --all-groups (kéo về ruff/mypy/import-linter/pytest/...).

inputs:
  python-version:
    description: Python version để setup-python install.
    required: false
    default: "3.12"

runs:
  using: composite
  steps:
    - name: Install uv (with cache)
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
        # Lock file ở ROOT (uv workspace có 1 lock duy nhất).
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    # Sync ở ROOT cho TOÀN BỘ workspace.
    # `--all-packages`: cài deps + editable install cho mọi workspace member
    #                   → có alembic/pydantic/lora_coverage_api trong .venv.
    # `--all-extras`  : kéo optional deps nếu có.
    # `--all-groups`  : kéo dev groups (ruff, mypy, import-linter, pytest, ...).
    # Thiếu --all-packages: deps của member (vd pydantic) và package member
    # (vd lora_coverage_api) sẽ KHÔNG có trong .venv → mypy plugin import fail,
    # import-linter báo "Could not find package", alembic CLI không spawn được.
    - name: Sync workspace deps
      shell: bash
      run: uv sync --all-packages --all-extras --all-groups